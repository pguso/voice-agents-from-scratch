<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice agents — WebSocket demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; }
    #log { white-space: pre-wrap; background: #111; color: #eee; padding: 1rem; border-radius: 8px; min-height: 8rem; }
    button { margin-right: 0.5rem; }
  </style>
</head>
<body>
  <h1>WebSocket demo</h1>
  <p>Open DevTools console if needed. Mic capture is optional — this page sends JSON text only.</p>
  <button id="send">Send sample message</button>
  <button id="clear">Clear log</button>
  <pre id="log"></pre>
  <script>
    const log = (m) => { document.getElementById("log").textContent += m + "\n"; };
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(proto + "://" + location.host + "/ws");
    ws.onopen = () => log("[open]");
    ws.onmessage = (ev) => log("[in] " + ev.data);
    ws.onerror = () => log("[error]");
    ws.onclose = () => log("[close]");
    document.getElementById("send").onclick = () => {
      ws.send(JSON.stringify({ type: "text", content: "hello from browser" }));
    };
    document.getElementById("clear").onclick = () => {
      document.getElementById("log").textContent = "";
    };
  </script>
</body>
</html>
